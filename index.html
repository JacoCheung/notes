<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notes · JacoCheung</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap">
<link rel="stylesheet" href="assets/site.css">
<style>
  /* Landing layout: sidebar (series nav) + main column ----------- */
  .wrap.with-side-nav {
    display: flex;
    align-items: flex-start;
    gap: 40px;
    max-width: 1180px;
  }
  .main-col {
    flex: 1 1 auto;
    min-width: 0;
    max-width: 760px;
    margin: 0 auto;
  }

  aside.series-nav {
    position: sticky;
    top: 32px;
    flex: 0 0 240px;
    width: 240px;
    max-height: calc(100vh - 64px);
    overflow-y: auto;
    padding-right: 20px;
    border-right: 1px solid var(--border);
    font-size: 13px;
  }
  aside.series-nav .nav-title {
    font-family: var(--font-mono);
    font-size: 10.5px;
    font-weight: 500;
    letter-spacing: 0.08em;
    color: var(--fg-subtle);
    text-transform: uppercase;
    margin-bottom: 14px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }
  aside.series-nav ul {
    list-style: none;
    padding: 0;
    margin: 0;
  }
  aside.series-nav .series-group { margin: 0 0 4px; }
  aside.series-nav .series-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
    user-select: none;
    padding: 5px 6px;
    border-radius: var(--radius-sm);
    color: var(--fg-muted);
    transition: color var(--dur-fast) var(--ease-out),
                background var(--dur-fast) var(--ease-out);
  }
  aside.series-nav .series-header:hover {
    color: var(--fg);
    background: var(--bg-elevated);
  }
  aside.series-nav .series-title {
    font-weight: 500;
    line-height: 1.35;
    flex: 1 1 auto;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    padding-right: 8px;
  }
  aside.series-nav .series-meta {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    flex: 0 0 auto;
  }
  aside.series-nav .series-count {
    font-family: var(--font-mono);
    font-size: 10.5px;
    color: var(--fg-subtle);
    padding: 1px 6px;
    background: var(--bg-subtle);
    border-radius: 999px;
  }
  aside.series-nav .series-toggle {
    font-size: 9px;
    width: 9px;
    color: var(--fg-subtle);
    transition: transform var(--dur-fast) var(--ease-out);
    display: inline-block;
  }
  aside.series-nav .series-group:not([data-collapsed="true"]) .series-toggle {
    transform: rotate(90deg);
  }
  aside.series-nav .series-toggle::before { content: "▸"; }

  aside.series-nav .series-posts {
    margin: 2px 0 8px 10px;
    padding-left: 10px;
    border-left: 1px solid var(--border);
    overflow: hidden;
    max-height: 1200px;
    transition: max-height var(--dur-base) var(--ease-out);
  }
  aside.series-nav .series-group[data-collapsed="true"] .series-posts {
    max-height: 0;
    margin: 0 0 0 10px;
  }
  aside.series-nav .series-posts li { margin: 1px 0; }
  aside.series-nav .series-posts a {
    display: block;
    padding: 4px 8px;
    color: var(--fg-muted);
    text-decoration: none;
    border-radius: var(--radius-sm);
    line-height: 1.4;
    font-size: 12.5px;
  }
  aside.series-nav .series-posts a:hover {
    background: var(--bg-elevated);
    color: var(--fg);
  }
  aside.series-nav .series-posts .post-badge {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--fg-subtle);
    margin-right: 6px;
  }

  @media (max-width: 960px) {
    .wrap.with-side-nav { flex-direction: column; gap: 24px; }
    aside.series-nav {
      position: static;
      width: 100%;
      flex: none;
      max-height: none;
      padding-right: 0;
      padding-bottom: 18px;
      border-right: none;
      border-bottom: 1px solid var(--border);
    }
  }
</style>
</head>
<body>
<button id="lang-toggle"  onclick="cycleLang()"></button>
<button id="theme-toggle" onclick="cycleTheme()"></button>

<div class="wrap with-side-nav">

  <aside class="series-nav reveal" id="series-nav">
    <div class="nav-title" id="series-nav-title"></div>
    <ul id="series-nav-list"></ul>
  </aside>

  <div class="main-col">

    <header class="site-header reveal">
      <h1>Notes</h1>
      <p class="tagline" id="tagline"></p>
    </header>

    <div class="filter-bar reveal" id="filter-bar">
      <span class="label" id="filter-label"></span>
      <span class="tag-chip active" data-tag=""></span>
    </div>

    <div id="post-list">
      <div class="empty" id="loading-msg"></div>
    </div>

    <footer class="reveal">
      <p>
        <a href="https://github.com/JacoCheung/notes">github.com/JacoCheung/notes</a>
      </p>
    </footer>

  </div>
</div>

<script>
// --- i18n ---
const I18N = {
  en: {
    tagline:    'GPU, HPC, and systems performance engineering — study notes',
    label_tags: 'Tags',
    chip_all:   'All',
    nav_title:  'Series',
    loading:    'Loading posts…',
    empty:      tag => `No posts match tag "${tag}".`,
    error:      msg => `Failed to load posts: ${msg}`,
    theme:      { '': 'Auto', light: 'Light', dark: 'Dark' },
    theme_title:'Toggle theme (auto → light → dark)',
    lang_btn:   '中文',
    lang_title: 'Switch to Chinese',
    html_lang:  'en',
  },
  zh: {
    tagline:    'GPU、HPC、系统性能工程的学习笔记',
    label_tags: '标签',
    chip_all:   '全部',
    nav_title:  '系列导航',
    loading:    '正在加载文章…',
    empty:      tag => `没有匹配标签 "${tag}" 的文章。`,
    error:      msg => `加载文章列表失败: ${msg}`,
    theme:      { '': '自动',  light: '亮色',  dark: '暗色' },
    theme_title:'切换主题 (自动 → 亮 → 暗)',
    lang_btn:   'EN',
    lang_title: '切换为英文',
    html_lang:  'zh-CN',
  },
};
let LANG = 'en';
try {
  const saved = localStorage.getItem('lang');
  if (saved === 'en' || saved === 'zh') LANG = saved;
} catch (_) {}
const t = () => I18N[LANG];

// --- Theme toggle (auto → light → dark → auto) ---
(function restoreTheme() {
  try {
    const saved = localStorage.getItem('theme');
    if (saved === 'light' || saved === 'dark') {
      document.documentElement.dataset.theme = saved;
    }
  } catch (_) {}
})();
function updateThemeBtn() {
  const btn = document.getElementById('theme-toggle');
  if (!btn) return;
  const cur = document.documentElement.dataset.theme || '';
  btn.textContent = t().theme[cur];
  btn.title = t().theme_title;
}
function cycleTheme() {
  const cur = document.documentElement.dataset.theme || '';
  const next = cur === '' ? 'light' : cur === 'light' ? 'dark' : '';
  if (next) {
    document.documentElement.dataset.theme = next;
    try { localStorage.setItem('theme', next); } catch (_) {}
  } else {
    delete document.documentElement.dataset.theme;
    try { localStorage.removeItem('theme'); } catch (_) {}
  }
  updateThemeBtn();
}

// --- Language toggle ---
function applyLang() {
  document.documentElement.lang = t().html_lang;
  const set = (id, val) => { const el = document.getElementById(id); if (el) el.textContent = val; };
  set('tagline', t().tagline);
  set('filter-label', t().label_tags);
  set('series-nav-title', t().nav_title);
  const allChip = document.querySelector('.tag-chip[data-tag=""]');
  if (allChip) allChip.textContent = t().chip_all;
  const loading = document.getElementById('loading-msg');
  if (loading) loading.textContent = t().loading;
  const langBtn = document.getElementById('lang-toggle');
  if (langBtn) { langBtn.textContent = t().lang_btn; langBtn.title = t().lang_title; }
  updateThemeBtn();
}
function cycleLang() {
  LANG = LANG === 'en' ? 'zh' : 'en';
  try { localStorage.setItem('lang', LANG); } catch (_) {}
  applyLang();
  if (ALL_POSTS.length) {
    rebuildTagBar(ALL_POSTS);
    renderSeriesNav(ALL_POSTS);
    renderPosts(ALL_POSTS);
  }
}

document.addEventListener('DOMContentLoaded', applyLang);

// --- Scroll reveal ---
document.addEventListener('DOMContentLoaded', function () {
  if (!('IntersectionObserver' in window)) {
    document.querySelectorAll('.reveal').forEach(el => el.classList.add('shown'));
    return;
  }
  const io = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        e.target.classList.add('shown');
        io.unobserve(e.target);
      }
    });
  }, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });
  document.querySelectorAll('.reveal').forEach(el => io.observe(el));
});

// --- Load and render posts.json ---
let ALL_POSTS = [];
let ACTIVE_TAG = '';

fetch('posts.json?_=' + Date.now())
  .then(r => r.json())
  .then(posts => {
    ALL_POSTS = posts;
    rebuildTagBar(posts);
    renderSeriesNav(posts);
    renderPosts(posts);
  })
  .catch(err => {
    document.getElementById('post-list').innerHTML =
      '<div class="empty">' + escapeHtml(t().error(err?.message || err)) + '</div>';
  });

function buildTagLabelMap(posts) {
  const map = {};
  posts.forEach(p => {
    const tags = p.tags || [];
    const tagsEn = p.tags_en || [];
    tags.forEach((tag, i) => {
      if (LANG === 'en' && tagsEn[i]) map[tag] = tagsEn[i];
      else if (!map[tag]) map[tag] = tag;
    });
  });
  return map;
}

function rebuildTagBar(posts) {
  const bar = document.getElementById('filter-bar');
  bar.querySelectorAll('.tag-chip:not([data-tag=""])').forEach(c => c.remove());
  const tagSet = new Set();
  posts.forEach(p => (p.tags || []).forEach(t => tagSet.add(t)));
  const labelMap = buildTagLabelMap(posts);
  const tags = [...tagSet].sort((a, b) => (labelMap[a] || a).localeCompare(labelMap[b] || b));
  tags.forEach(tag => {
    const chip = document.createElement('span');
    chip.className = 'tag-chip' + (tag === ACTIVE_TAG ? ' active' : '');
    chip.dataset.tag = tag;
    chip.textContent = labelMap[tag] || tag;
    bar.appendChild(chip);
  });
  bar.querySelectorAll('.tag-chip').forEach(chip => {
    chip.onclick = () => {
      bar.querySelectorAll('.tag-chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      ACTIVE_TAG = chip.dataset.tag;
      renderPosts(ALL_POSTS);
    };
  });
}

// --- Sidebar: collapsible series nav ---
const NAV_COLLAPSED_KEY = 'landing-series-collapsed';
function loadCollapsedSet() {
  try {
    const raw = localStorage.getItem(NAV_COLLAPSED_KEY);
    return raw ? new Set(JSON.parse(raw)) : new Set();
  } catch (_) { return new Set(); }
}
function saveCollapsedSet(set) {
  try { localStorage.setItem(NAV_COLLAPSED_KEY, JSON.stringify([...set])); } catch (_) {}
}

function renderSeriesNav(posts) {
  const list = document.getElementById('series-nav-list');
  if (!list) return;
  const pick = (p, k) => (LANG === 'en' && p[k + '_en']) ? p[k + '_en'] : (p[k] || '');

  const seriesMap = {};
  posts.forEach(p => {
    if (!p.series) return;
    if (!seriesMap[p.series]) {
      seriesMap[p.series] = {
        key: p.series,
        title: p.series_title || p.series,
        title_en: p.series_title_en || p.series_title || p.series,
        posts: [],
      };
    }
    seriesMap[p.series].posts.push(p);
  });

  const series = Object.values(seriesMap);
  series.forEach(s => s.posts.sort((a, b) => (a.series_order || 0) - (b.series_order || 0)));
  // sort series by their latest post date (newest first)
  series.sort((a, b) => {
    const aMax = a.posts.reduce((d, p) => p.date > d ? p.date : d, '');
    const bMax = b.posts.reduce((d, p) => p.date > d ? p.date : d, '');
    return aMax > bMax ? -1 : aMax < bMax ? 1 : 0;
  });

  const collapsed = loadCollapsedSet();

  list.innerHTML = series.map(s => {
    const title = LANG === 'en' ? s.title_en : s.title;
    const isCollapsed = collapsed.has(s.key);
    const posts = s.posts.map(p => {
      const order = p.series_order ? `<span class="post-badge">${escapeHtml(String(p.series_order))}</span>` : '';
      return `<li><a href="posts/${escapeHtml(p.slug)}.html" title="${escapeHtml(pick(p, 'summary') || '')}">${order}${escapeHtml(pick(p, 'title'))}</a></li>`;
    }).join('');
    return `
      <li class="series-group" data-key="${escapeHtml(s.key)}"${isCollapsed ? ' data-collapsed="true"' : ''}>
        <div class="series-header" role="button" tabindex="0" aria-expanded="${isCollapsed ? 'false' : 'true'}">
          <span class="series-title">${escapeHtml(title)}</span>
          <span class="series-meta">
            <span class="series-count">${s.posts.length}</span>
            <span class="series-toggle" aria-hidden="true"></span>
          </span>
        </div>
        <ul class="series-posts">${posts}</ul>
      </li>
    `;
  }).join('');

  list.querySelectorAll('.series-header').forEach(h => {
    const toggle = () => {
      const li = h.parentElement;
      const k = li.dataset.key;
      const set = loadCollapsedSet();
      const nowCollapsed = li.dataset.collapsed !== 'true';
      if (nowCollapsed) {
        li.setAttribute('data-collapsed', 'true');
        set.add(k);
      } else {
        li.removeAttribute('data-collapsed');
        set.delete(k);
      }
      h.setAttribute('aria-expanded', nowCollapsed ? 'false' : 'true');
      saveCollapsedSet(set);
    };
    h.addEventListener('click', toggle);
    h.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggle(); }
    });
  });
}

function renderPosts(posts) {
  const list = document.getElementById('post-list');
  const filtered = ACTIVE_TAG
    ? posts.filter(p => (p.tags || []).includes(ACTIVE_TAG))
    : posts;
  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty">' + escapeHtml(t().empty(ACTIVE_TAG)) + '</div>';
    return;
  }
  const labelMap = buildTagLabelMap(posts);
  const pick = (p, k) => (LANG === 'en' && p[k + '_en']) ? p[k + '_en'] : (p[k] || '');

  const seriesMap = {};
  const standalone = [];
  filtered.forEach(p => {
    if (p.series) {
      if (!seriesMap[p.series]) {
        seriesMap[p.series] = {
          key: p.series,
          title: p.series_title || p.series,
          title_en: p.series_title_en || p.series_title || p.series,
          posts: [],
        };
      }
      seriesMap[p.series].posts.push(p);
    } else {
      standalone.push(p);
    }
  });

  const units = [];
  Object.values(seriesMap).forEach(s => {
    s.posts.sort((a, b) => (a.series_order || 0) - (b.series_order || 0));
    const maxDate = s.posts.reduce((d, p) => p.date > d ? p.date : d, '');
    units.push({ type: 'series', sort_date: maxDate, series: s });
  });
  standalone.forEach(p => units.push({ type: 'post', sort_date: p.date, post: p }));
  units.sort((a, b) => a.sort_date > b.sort_date ? -1 : a.sort_date < b.sort_date ? 1 : 0);

  const renderPost = (p, badge, extraClass) => `
    <a class="post${extraClass ? ' ' + extraClass : ''}" href="posts/${escapeHtml(p.slug)}.html">
      <div class="post-title">${badge}${escapeHtml(pick(p, 'title'))}</div>
      <div class="post-meta">${escapeHtml(p.date)}${pick(p, 'reading') ? ' · ' + escapeHtml(pick(p, 'reading')) : ''}</div>
      <div class="post-summary">${escapeHtml(pick(p, 'summary'))}</div>
      <div class="post-tags">
        ${(p.tags || []).map(tag => '<span class="post-tag">' + escapeHtml(labelMap[tag] || tag) + '</span>').join('')}
      </div>
    </a>
  `;

  const MAX_SERIES = 7;
  let seriesShown = 0;
  list.innerHTML = units.map(u => {
    if (u.type === 'post') return renderPost(u.post, '', '');
    if (seriesShown >= MAX_SERIES) return '';
    seriesShown++;

    const s = u.series;
    const totalParts = s.posts.length;
    const title = LANG === 'en' ? s.title_en : s.title;
    const partsLabel = LANG === 'en' ? 'parts' : '篇';
    const collapsible = totalParts > 1;
    // collapsed state shows the FIRST post (series_order 1, the entry point);
    // posts array is already sorted ASC by series_order, so index 0 = Part 1.
    const visibleIdx = 0;
    const expandHint = collapsible
      ? `<span class="series-toggle" aria-hidden="true">▾</span>`
      : '';
    const headerAttrs = collapsible
      ? `role="button" tabindex="0" onclick="toggleSeries(this)" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();toggleSeries(this);}"`
      : '';
    return `
      <div class="series-group"${collapsible ? ' data-collapsed="true"' : ''}>
        <div class="series-header" ${headerAttrs}>
          <span class="series-title">${escapeHtml(title)}</span>
          <span class="series-count">${totalParts} ${partsLabel}${expandHint}</span>
        </div>
        ${s.posts.map((p, idx) => {
          const badge = `<span class="series-badge">${p.series_order}/${totalParts}</span>`;
          const cls = (collapsible && idx !== visibleIdx) ? 'hidden-collapsed' : '';
          return renderPost(p, badge, cls);
        }).join('')}
      </div>
    `;
  }).join('');
}

function toggleSeries(headerEl) {
  const group = headerEl.parentElement;
  if (group.getAttribute('data-collapsed') === 'true') {
    group.removeAttribute('data-collapsed');
  } else {
    group.setAttribute('data-collapsed', 'true');
  }
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}
</script>
</body>
</html>

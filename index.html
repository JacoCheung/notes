<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notes — JacoCheung</title>
<style>
  :root {
    --fg: #1a1a1a; --muted: #555; --bg: #ffffff;
    --accent: #0b6cc4; --soft: #f4f6f8; --border: #d9dde2;
  }
  @media (prefers-color-scheme: dark) {
    :root { --fg: #e6e6e6; --muted: #a9b1ba; --bg: #121417;
            --accent: #5fb3ff; --soft: #1b1f24; --border: #2a2f36; }
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
                 "Hiragino Sans GB", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
    color: var(--fg); background: var(--bg);
    line-height: 1.72; font-size: 16px;
  }
  .wrap { max-width: 760px; margin: 60px auto; padding: 0 24px 80px; }
  header { margin-bottom: 48px; }
  h1 { font-size: 2.1rem; margin: 0 0 6px; letter-spacing: -0.01em; }
  .tagline { color: var(--muted); margin: 0; font-size: 1rem; }
  h2 { font-size: 1.1rem; margin: 40px 0 16px;
       color: var(--muted); font-weight: 600;
       letter-spacing: 0.06em; text-transform: uppercase; }
  .post {
    display: block;
    padding: 16px 18px;
    margin: 10px 0;
    border: 1px solid var(--border);
    border-radius: 8px;
    text-decoration: none;
    color: var(--fg);
    transition: all 0.15s;
    background: var(--bg);
  }
  .post:hover {
    background: var(--soft);
    border-color: var(--accent);
    transform: translateX(2px);
  }
  .post-title {
    font-size: 1.05rem;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .post-meta {
    font-size: 0.82rem;
    color: var(--muted);
  }
  .post-summary {
    margin-top: 6px;
    font-size: 0.92rem;
    color: var(--muted);
    line-height: 1.55;
  }
  footer {
    margin-top: 60px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
    font-size: 0.82rem;
    color: var(--muted);
  }
  footer a { color: var(--accent); text-decoration: none; }
  footer a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <h1>Notes</h1>
    <p class="tagline">GPU、HPC、系统性能工程的学习笔记</p>
  </header>

  <h2>性能 / GEMM</h2>

  <a class="post" href="posts/gemm-ai.html">
    <div class="post-title">GEMM 计算 / 访存比分析</div>
    <div class="post-meta">2026-04-24 · 约 25 分钟</div>
    <div class="post-summary">
      从方阵基线到任意形状 tile，再到 2 级 blocking 与跨 tile 复用，完整推导
      arithmetic intensity；并讨论 Split-K / Stream-K / Persistent / Cluster
      等调度算法，以及 $K_t$、$L2$ cache 在实战中的选型经验。
    </div>
  </a>

  <footer>
    <p>
      Source: <a href="https://github.com/JacoCheung/notes">github.com/JacoCheung/notes</a>
    </p>
  </footer>

</div>
</body>
</html>

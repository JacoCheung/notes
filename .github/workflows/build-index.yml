name: Rebuild posts index

on:
  push:
    branches: [main]
    paths:
      - 'posts/**/*.html'
      - 'scripts/build-index.py'
      - '.github/workflows/build-index.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Regenerate posts.json
        run: python3 scripts/build-index.py

      - name: Commit if changed
        run: |
          if git diff --quiet posts.json; then
            echo "posts.json unchanged, nothing to commit"
            exit 0
          fi
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add posts.json
          git commit -m 'chore: auto-rebuild posts.json'
          git push
